<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台股週報</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #4f8ef7;
      --green: #26c281;
      --red: #e05c5c;
      --yellow: #f0c040;
      --text: #d4d8e8;
      --muted: #7a7f9a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; line-height: 1.7; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; color: var(--accent); }
    header span { font-size: 0.8rem; color: var(--muted); }

    .disclaimer {
      background: #1e1a10;
      border-left: 3px solid var(--yellow);
      padding: 0.6rem 1.2rem;
      font-size: 0.78rem;
      color: var(--yellow);
      text-align: center;
    }

    .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

    .report-list h2 { font-size: 1rem; color: var(--muted); margin-bottom: 1.2rem; letter-spacing: 0.05em; text-transform: uppercase; }

    .report-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color 0.15s;
    }
    .report-card:hover { border-color: var(--accent); }
    .report-card .date { font-size: 0.85rem; color: var(--muted); }
    .report-card .title { font-weight: 600; margin-bottom: 0.2rem; }
    .report-card .badge {
      font-size: 0.72rem;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      background: #1a2a1a;
      color: var(--green);
      border: 1px solid var(--green);
      white-space: nowrap;
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.75rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: 3rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>📊 台股週報</h1>
    <span>每週六 21:00 自動更新</span>
  </header>
  <div class="disclaimer">
    ⚠️ 本週報為個人研究紀錄，非投資建議，不構成任何買賣依據。投資有風險，請自行判斷。
  </div>
  <div class="container">
    <div class="report-list">
      <h2>歷史週報</h2>
      <!-- REPORT_LIST -->
      <a href="reports/report-2026-04-24.html" style="text-decoration:none;">
        <div class="report-card">
          <div>
            <div class="title">台股週報 2026-04-24</div>
            <div class="date">2026-04-24</div>
          </div>
          <span class="badge">✓ 已發布</span>
        </div>
      </a>
      <a href="reports/report-2026-04-18.html" style="text-decoration:none;">
        <div class="report-card">
          <div>
            <div class="title">台股週報 2026-04-18</div>
            <div class="date">2026-04-18</div>
          </div>
          <span class="badge">✓ 已發布</span>
        </div>
      </a>
<!-- /REPORT_LIST -->
    </div>
  </div>
  <footer>
    美股 → 台股週報系統 · 由 Hermes 自動生成 · 非投資建議
  </footer>
</body>
</html>
